<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>기름따라 졸졸졸 - Tactical Fuel HUD V5.0</title>

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <!-- Custom Styles -->
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" as="style" crossorigin
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />
</head>

<body class="tactical-os">
  <!-- Dynamic HUD Background -->
  <div class="hud-grid-overlay"></div>
  <div class="bg-glow-a"></div>
  <div class="bg-glow-b"></div>

  <main class="app-container">
    <!-- Top Tactical Header -->
    <header class="hud-header">
      <div class="header-main">
        <div class="header-logo-group">
          <span class="hud-label">SYSTEM_STATUS: ACTIVE</span>
          <h1 class="hud-title">REAL-TIME FUEL PRICE CENTER <span class="v-badge">V5.0</span></h1>
        </div>
        <div class="header-location">
          <span class="loc-icon">🛰️</span>
          <span id="locationText" class="loc-val">SCANNING_POSITION...</span>
        </div>
      </div>
      <div class="header-actions">
        <button class="hud-btn-icon" id="notifBtn">NOTIF</button>
        <button class="hud-btn-icon" id="searchBtn">SEARCH</button>
      </div>
    </header>

    <!-- Main Tactical Content -->
    <div id="tabContent" class="hud-body">

      <!-- HOME TAB: Mission Control -->
      <div id="homeTab" class="tab-pane active">

        <!-- Hero HUD Section: Radar & Report -->
        <section class="hud-hero">
          <div class="radar-module">
            <div class="canvas-container">
              <canvas id="radarCanvas" width="800" height="800"></canvas>
            </div>
            <div class="radar-meta">
              <div class="meta-row">
                <span class="meta-label">TARGET_SCAN:</span>
                <span id="targetCount" class="meta-val">0 UNITS</span>
              </div>
              <p id="radarStatus" class="radar-status-msg">INITIALIZING_SCANNER...</p>
            </div>
          </div>

          <div class="quick-report-module">
            <div class="report-header">
              <span class="report-badge">QUICK REPORT</span>
              <p class="report-desc">이상 가격 발견 시 즉시 제보하세요.</p>
            </div>
            <button id="reportBtn" class="report-cta">
              <span class="cta-icon">⚠️</span>
              <span>얌채 주유소 신고하기</span>
            </button>
            <button class="report-sub-link">REPORT FORM OPEN</button>
          </div>
        </section>

        <!-- Analytics HUD Section -->
        <section class="hud-analytics">
          <div class="trend-card">
            <div class="card-header">
              <span class="card-icon">📈</span>
              <h3 class="card-title">14-DAY PRICE TREND</h3>
            </div>
            <div id="trendHistory" class="trend-history-list">
              <!-- Dynamic trend items -->
            </div>
          </div>

          <div class="calc-card">
            <div class="card-header">
              <span class="card-icon">🧮</span>
              <h3 class="card-title">SMART SAVINGS CALC</h3>
            </div>
            <div class="calc-body">
              <div class="calc-row">
                <label>FUEL(L)</label>
                <input type="number" value="40" id="calcFuel" class="hud-input">
              </div>
              <div class="calc-result">
                <span class="res-label">EXPECTED SAVINGS</span>
                <span id="resAmount" class="res-val">+18,500 KRW</span>
              </div>
            </div>
          </div>
        </section>

        <!-- Tactical Rankings List -->
        <section class="hud-rankings">
          <div class="section-title-row">
            <h3 class="section-title">TACTICAL RANKINGS</h3>
            <div class="list-filters">
              <select id="fuelSelect" class="hud-select">
                <option value="gasoline">휘발유</option>
                <option value="diesel">경유</option>
              </select>
              <button id="refreshBtn" class="hud-refresh-btn">REFRESH</button>
            </div>
          </div>
          <div id="stationList" class="station-grid-v5">
            <!-- Tactical List Items -->
          </div>
        </section>
      </div>

      <!-- Other Tabs Placeholder -->
      <div id="mapTab" class="tab-pane">...</div>
      <div id="communityTab" class="tab-pane">...</div>
    </div>

    <!-- Tactical Bottom Navigation -->
    <nav class="hud-nav">
      <button class="nav-btn active" data-tab="home">HUD</button>
      <button class="nav-btn" data-tab="map">MAP</button>
      <button class="nav-btn" data-tab="community">LOGS</button>
      <button class="nav-btn" data-tab="more">SYS</button>
    </nav>
  </main>

  <!-- Scripts -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="app.js"></script>
</body>

</html>
