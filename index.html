<!-- Premium Background Layers -->
<div class="bg-shape bg-a"></div>
<div class="bg-shape bg-b"></div>
<div class="bg-noise"></div>

<main class="app">
  <!-- Ultra-Premium Header (As per image) -->
  <header class="app-header">
    <div class="header-left">
      <h1 class="app-logo">기름따라 <span class="accent">졸졸졸</span> <span class="emoji">⛽</span></h1>
    </div>
    <div class="header-right">
      <button class="icon-btn" id="notifBtn"><span class="icon">🔔</span></button>
      <button class="icon-btn" id="searchBtn"><span class="icon">🔍</span></button>
    </div>
  </header>

  <!-- Content Sections (Tab Based) -->
  <div id="tabContent">
    <!-- HOME TAB: The Main UI from Image -->
    <div id="homeTab" class="tab-pane active">

      <!-- Radar Scan Card -->
      <section class="glass-card radar-stack">
        <div class="radar-visual">
          <div class="radar-scanner-v4">
            <div id="radarBlips" class="radar-blips"></div>
            <div class="radar-sweep"></div>
            <div class="radar-center"></div>
          </div>
        </div>
        <div class="radar-info">
          <h2 class="card-title-v4">최저가 주유소 스캔 중</h2>
          <div class="location-row">
            <span class="loc-text">현재 위치: <span id="locationText" class="val">서울 강남구</span></span>
            <button id="refreshBtn" class="mini-btn">Refresh</button>
          </div>
        </div>
      </section>

      <!-- Mini Map Card -->
      <section class="glass-card map-stack">
        <div id="miniMap" class="map-v4"></div>
        <div class="map-overlay">
          <span class="map-brand">mapbox</span>
        </div>
      </section>

      <!-- Station List Section -->
      <section class="list-container">
        <h3 class="list-header-v4">내 주변 주유소 목록</h3>

        <div class="filter-bar-v4">
          <select id="fuelSelect" class="v4-select">
            <option value="gasoline">휘발유</option>
            <option value="diesel">경유</option>
          </select>
          <select id="radiusInput" class="v4-select">
            <option value="1">1km</option>
            <option value="3" selected>3km</option>
            <option value="5">5km</option>
          </select>
        </div>

        <div id="stationList" class="v4-station-list">
          <!-- Dynamic Items with Image Styling -->
        </div>
      </section>

      <!-- New Features Action Bar -->
      <section class="action-grid">
        <button class="action-card report" id="reportLink">
          <span class="icon">⚖️</span>
          <span>신문고 신고하기</span>
        </button>
        <button class="action-card trend" id="trendLink">
          <span class="icon">📈</span>
          <span>14일 유가 트렌드</span>
        </button>
      </section>
    </div>

    <!-- COMMUNITY TAB (Hidden by default) -->
    <div id="communityTab" class="tab-pane">
      <section class="glass-card comm-header">
        <h2 class="card-title-v4">자유게시판 (정보 교류)</h2>
        <p class="sub-text">실제 금액과 다른 정보를 발견하면 공유해주세요!</p>
      </section>
      <div id="forumList" class="forum-list">
        <!-- Community Posts -->
      </div>
    </div>
  </div>

  <!-- Bottom Navigation Bar (As per image) -->
  <nav class="bottom-nav">
    <button class="nav-item active" data-tab="home">
      <span class="nav-icon active">🏠</span>
      <span class="nav-label">홈</span>
    </button>
    <button class="nav-item" data-tab="fuel">
      <span class="nav-icon">⛽</span>
      <span class="nav-label">내 주유</span>
    </button>
    <button class="nav-item" data-tab="map">
      <span class="nav-icon">📍</span>
      <span class="nav-label">지도</span>
    </button>
    <button class="nav-item" data-tab="community">
      <span class="nav-icon">💬</span>
      <span class="nav-label">커뮤니티</span>
    </button>
    <button class="nav-item" data-tab="more">
      <span class="nav-icon">...</span>
      <span class="nav-label">더보기</span>
    </button>
  </nav>
</main>
