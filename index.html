<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>기름따라 졸졸졸 - Tactical HUD v1.1 (Optimized)</title>

  <!-- Critical Asset Preload -->
  <link rel="preload" as="style"
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />
</head>

<body class="tactical-os-v8">
  <div class="hud-scanning-grid"></div>
  <div class="ambient-glow g-1"></div>
  <div class="ambient-glow g-2"></div>

  <div class="dashboard-wrapper">
    <header class="system-header">
      <div class="brand-logic">
        <div class="brand-logo">기름따라 졸졸졸</div>
        <div class="system-tag">TACTICAL_FUEL_HUD_V1.1 // PERFORMANCE_OPTIMIZED</div>
      </div>
      <div class="system-readouts">
        <div class="readout-box">
          <span class="label">LOCATION</span>
          <span id="locationText" class="value">SYNCING...</span>
        </div>
        <div class="readout-box">
          <span class="label">SYSTEM TIME</span>
          <span id="sysTime" class="value">00:00:00</span>
        </div>
        <div class="readout-box action-box">
          <button id="searchBtn" class="hud-mini-btn">SEARCH</button>
          <button id="refreshBtn" class="hud-mini-btn primary">SYNC</button>
        </div>
      </div>
    </header>

    <main class="dashboard-grid">
      <aside class="grid-col col-left">
        <section class="widget radar-widget">
          <div class="widget-header">
            <span class="w-icon">📡</span>
            <span class="w-title">SCANNER</span>
            <span class="w-status">INTEL_ON</span>
          </div>
          <div class="canvas-wrap">
            <canvas id="radarCanvas"></canvas>
            <div class="radar-overlay-data l">LAT: <span id="curLat">0.0</span></div>
            <div class="radar-overlay-data r">LNG: <span id="curLng">0.0</span></div>
          </div>
          <div class="radar-stats">
            <div class="stat-item"><span class="l">TARGETS:</span><span id="targetCount" class="v">0</span></div>
            <div class="stat-item"><span class="l">SCAN_RATE:</span><span class="v">60Hz</span></div>
          </div>
        </section>

        <section class="widget trend-widget">
          <div class="widget-header">
            <span class="w-icon">📊</span>
            <span class="w-title">MARKET TREND</span>
          </div>
          <div id="trendHistory" class="technical-list" style="padding:1rem;"></div>
        </section>
      </aside>

      <div class="grid-col col-main">
        <section class="widget list-widget">
          <div class="widget-header">
            <div class="header-group">
              <span class="w-icon">🧭</span>
              <span class="w-title">STATIONS</span>
            </div>
            <div class="filter-group" style="margin-left:auto; display:flex; gap:0.5rem;">
              <select id="fuelSelect" class="hud-select">
                <option value="gasoline">휘발유</option>
                <option value="diesel">경유</option>
              </select>
              <select id="radiusSelect" class="hud-select">
                <option value="1">1KM</option>
                <option value="3" selected>3KM</option>
                <option value="5">5KM</option>
              </select>
            </div>
          </div>
          <div class="filter-chips-v8" style="padding:0.75rem 1rem; display:flex; gap:0.5rem;">
            <button class="chip" data-filter="wash">🫧 세차</button>
            <button class="chip" data-filter="mart">🛒 편의점</button>
          </div>
          <div id="stationList" class="station-scroller" style="padding:0 1.25rem 1.25rem;"></div>
        </section>
      </div>

      <aside class="grid-col col-right">
        <section class="widget report-widget">
          <div class="widget-header">
            <span class="w-icon">🛡️</span>
            <span class="w-title">REPORTS</span>
          </div>
          <div class="report-content" style="padding:1.25rem;">
            <p class="r-desc" style="margin:0 0 1rem; font-size:0.85rem; color:#94a3b8;">이상 가격 발견 시 즉시 제보 바랍니다.</p>
            <div class="report-btns" style="display:grid; grid-template-columns:1fr 1fr; gap:0.75rem;">
              <button id="shinmungoBtn" class="r-btn shin">📜 신문고</button>
              <button id="writePostBtn" class="r-btn detail">📝 상세 제보</button>
            </div>
          </div>
        </section>

        <section class="widget calc-widget">
          <div class="widget-header">
            <span class="w-icon">🧮</span>
            <span class="w-title">BENEFIT_SIM</span>
          </div>
          <div class="calc-body-v8" style="padding:1.25rem;">
            <input type="number" id="calcFuel" value="40" class="hud-input-v8"
              style="width:100%; margin-bottom:0.5rem;">
            <div class="calc-res">
              <span id="resAmount" class="res-value">+0W</span>
            </div>
          </div>
        </section>

        <section class="widget forum-widget">
          <div class="widget-header">
            <span class="w-icon">📜</span>
            <span class="w-title">INTEL_FEED</span>
          </div>
          <div id="forumList" class="forum-scroller" style="padding:1rem;"></div>
        </section>
      </aside>
    </main>

    <div id="mapTab" class="tab-view inactive"
      style="position:fixed; inset:0; z-index:1000; background:var(--bg-deep);">
      <button id="closeMap" class="close-btn">BACK_TO__HUD</button>
      <div id="fullMap" style="width:100%; height:100%;"></div>
    </div>

    <nav class="system-nav">
      <button class="nav-item active" data-tab="home">HUD_C</button>
      <button class="nav-item" id="openMap">MAP_I</button>
      <button class="nav-item" data-tab="sys">LOG</button>
    </nav>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" defer></script>
  <script src="app.js" defer></script>
</body>

</html>
